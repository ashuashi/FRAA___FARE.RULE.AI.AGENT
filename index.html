/* ---------- Storage ---------- */
const NS = "fraa.v1";
const K = { log: NS+".fallback_log", settings: NS+".settings" };

/* Supabase-backed rule helpers */
const sbRules = {
  async list() {
    const { data, error } = await supabase.from("food_factory").select("*").order("created_at", { ascending: false });
    if (error) { console.error("Supabase list error:", error); return []; }
    return data || [];
  },
  async insert(rule) {
    const { data, error } = await supabase.from("food_factory").insert([rule]).select().single();
    if (error) throw error;
    return data;
  },
  async update(id, patch) {
    const { data, error } = await supabase.from("food_factory").update({ ...patch, updated_at: nowISO() }).eq("id", id).select().single();
    if (error) throw error;
    return data;
  },
  async remove(id) {
    const { error } = await supabase.from("food_factory").delete().eq("id", id);
    if (error) throw error;
  },
  async findByHash(hash) {
    const { data } = await supabase.from("food_factory").select("*").eq("hash_key", hash).maybeSingle();
    return data || null;
  },
};

const store = {
  /* Rules — delegated to Supabase (kept for backward-compat callers) */
  getRules: async () => sbRules.list(),
  setRules: async (v) => { /* no-op: mutations happen via sbRules */ },

  /* Fallback log — still localStorage */
  getLog: () => JSON.parse(localStorage.getItem(K.log) || "[]"),

  /* Settings — still localStorage */
  getSettings: () => Object.assign({

/* ---------- Hash + standardize ---------- */
function normalizeRuleText(s){
  return s.replace(/\r\n/g,"\n")
    .replace(/[\u2018\u2019]/g,"'")
    .replace(/[\u201C\u201D]/g,'"')
    .replace(/\s+/g," ")
    .replace(/[\.,;:!?\-]+/g, m => m[0])
    .trim().toLowerCase();
}
async function sha256(text){
  const buf = new TextEncoder().encode(text);
  const h = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,"0")).join("");
}
async function hashRule(raw){
  const cleaned = normalizeRuleText(raw);
  const hash = await sha256(cleaned);
  return { cleaned, hash };
}
function deterministicStandardize(raw){
  const text = raw.replace(/\s+/g," ").trim();
  const sections = { "Cancellation":[], "Date Change":[], "No Show":[], "Baggage":[] };
  function grab(re, max=3){
    const out=[], seen=new Set(); const r=new RegExp(re.source,"gi"); let m;
    while ((m=r.exec(text)) && out.length<max){
      const v=m[0].replace(/\s+/g," ").trim();
      if (!seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); out.push(v); }
    }
    return out;
  }
  sections["Cancellation"] = grab(/(cancel\w*|refund\w*)[^.;]*?(₹|inr|usd|\$|€)\s?\d[\d,]*[^.;]*/i,3);
  if (/non[-\s]?refundable/i.test(text)) sections["Cancellation"].push("Non-refundable");
  sections["Date Change"] = grab(/(date\s?change|reschedul\w*|chang\w*)[^.;]*?(₹|inr|usd|\$|€)\s?\d[\d,]*[^.;]*/i,3);
  if (/fare\s?difference/i.test(text)) sections["Date Change"].push("Fare difference applicable");
  if (/no[-\s]?show/i.test(text)) {
    const ns = grab(/no[-\s]?show[^.;]{0,80}/i,1);
    sections["No Show"] = ns.length ? ns : ["Non-refundable"];
  }
  sections["Baggage"] = grab(/\d{1,3}\s?kg[^.;]{0,40}/i,3);
  const output = TEMPLATE_SECTIONS.map(s => {
    const bullets = sections[s].length ? sections[s] : ["Not specified"];
    return s+":\n"+bullets.map(b=>"- "+b).join("\n");
  }).join("\n\n");
  const filled = Object.values(sections).filter(a=>a.length>0).length / TEMPLATE_SECTIONS.length;
  return { sections, output, confidence: Math.max(0.55, filled) };
}

/* ---------- API ---------- */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const nowISO = () => new Date().toISOString();
const wait = ms => new Promise(r => setTimeout(r, ms));

const api = {
  async ingest(payload){
    const { cleaned, hash } = await hashRule(payload.raw_text);
    const existing = await sbRules.findByHash(hash);
    if (existing) return { rule: existing, matched_existing: true };
    const { output, confidence } = deterministicStandardize(payload.raw_text);
    const rule = {
      id: uid(),
      airline: payload.airline,
      supplier: payload.supplier,
      sector_type: payload.sector_type,
      fare_type: payload.fare_type,
      from_sector: payload.from_sector ? payload.from_sector.toUpperCase() : null,
      to_sector: payload.to_sector ? payload.to_sector.toUpperCase() : null,
      raw_text: payload.raw_text,
      cleaned_text: cleaned,
      hash_key: hash,
      standardized_output: output,
      source: "ai",
      confidence,
      created_at: nowISO(),
      updated_at: nowISO(),
    };
    const saved = await sbRules.insert(rule);
    return { rule: saved, matched_existing: false };
  },
  async listRules(){ return sbRules.list(); },
  async updateRule(id, patch){
    return sbRules.update(id, { ...patch, source:"manual", confidence:1 });
  },
  async deleteRule(id){ await sbRules.remove(id); },
  async reprocess(id){
    const rules = await sbRules.list();
    const r = rules.find(r => r.id === id);
    if (!r) return null;
    const { output, confidence } = deterministicStandardize(r.raw_text);
    return sbRules.update(id, { standardized_output: output, confidence, source:"ai" });
  },
  async getFallbackLog(){ return store.getLog(); },
  async testConnection(){
    await wait(400);
    const s = store.getSettings();
    if (!s.endpoint_url) return { ok:false, message:"Endpoint URL is empty" };
    if (!s.api_key) return { ok:false, message:"API key is empty" };
    if (!/^https?:\/\//i.test(s.endpoint_url)) return { ok:false, message:"Endpoint URL must start with http(s)://" };
    return { ok:true, message:"Configuration looks valid. Backend will perform live ping." };
  },
};

function toast(msg, type="success"){
  const el = document.createElement("div");
  const colors = { success:"bg-success text-white", error:"bg-destructive text-white", info:"bg-primary text-white" };
  el.className = `toast-enter rounded-md shadow-lg px-4 py-3 text-sm ${colors[type]||colors.success}`;

/* ---------- Tiny helpers ---------- */
function h(tag, attrs={}, ...children){
  const el = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") el.className = attrs[k];
    else if (k === "html") el.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (attrs[k] !== false && attrs[k] != null) el.setAttribute(k, attrs[k]);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return el;
}

        "CSV columns: airline, supplier, sector_type, fare_type, from, to, raw_text"));
      if (state.csvBusy) {

          h("div", { class:"flex justify-between text-xs text-mutedfg" },
            h("span",{},"Processing…"),
            h("span",{}, `${state.csvProgress.done} / ${state.csvProgress.total}`)
          ),
          h("div", { class:"h-2 w-full rounded-full bg-muted overflow-hidden" },

          )

      ));

    wrap.appendChild(card(cardBody(tabsBar, meta, tabContent)));

    /* preview */
    if (state.preview) {
      const p = state.preview;
      const previewBox = card(
        h("div", { class:"px-6 py-4 flex items-center justify-between border-b border-border" },
          h("h3", { class:"text-base font-semibold" }, "Result"),

        ),

              h("pre", { class:"max-h-72 overflow-auto rounded-md border border-border bg-muted/40 p-3 font-mono text-xs whitespace-pre-wrap" }, p.rule.raw_text)
            ),
            (() => {
              const col = h("div", { class:"space-y-2" });

                h("div", { class:"text-xs uppercase tracking-wider text-mutedfg" }, "Standardized output")
              );
              if (state.editing) {
                head.appendChild(btn("Save", { size:"sm", onClick: saveOverride }));
                col.appendChild(head);
                const ta = textarea({ rows:12, value: state.editValue, class:"font-mono text-xs" });
                ta.addEventListener("input", e => state.editValue = e.target.value);
                col.appendChild(ta);
              } else {
                head.appendChild(btn("Override", { size:"sm", variant:"ghost", onClick: () => { state.editing=true; rerender(); } }));
                col.appendChild(head);
                col.appendChild(h("pre", { class:"max-h-72 overflow-auto rounded-md border border-border bg-card p-3 font-mono text-xs whitespace-pre-wrap" }, p.rule.standardized_output));
              }
              return col;
            })()
          ),
          h("div", { class:"grid gap-3 sm:grid-cols-3 rounded-md border border-border bg-muted/30 p-3 text-xs" },
            h("div", {}, h("div", { class:"text-mutedfg" }, "Hash"), h("div", { class:"truncate font-mono" }, p.rule.hash_key)),
            h("div", {}, h("div", { class:"text-mutedfg" }, "Confidence"), h("div", { class:"font-mono" }, `${(p.rule.confidence*100).toFixed(0)}%`)),
            h("div", {}, h("div", { class:"text-mutedfg" }, "Updated"), h("div", { class:"font-mono" }, fmtDate(p.rule.updated_at)))
          )
        )
      );
      wrap.appendChild(previewBox);
    }

    return wrap;
  }

  async function submit(){
    const text = state.rawText.trim();
    if (!text) return toast("Paste fare rule text first","error");
    state.busy = true; rerender();
    try {
      const res = await api.ingest({
        airline: state.airline,
        supplier: state.supplier,
        sector_type: state.sector_type,
        fare_type: state.fare_type,
        from_sector: state.from || undefined,
        to_sector: state.to || undefined,
        raw_text: text,
      });
      const rule = res.matched_existing ? { ...res.rule, source:"exact" } : res.rule;
      state.preview = { rule, matched_existing: res.matched_existing };
      state.editValue = rule.standardized_output;
      state.editing = false;
      toast(res.matched_existing ? "Exact hash match — returned stored output" : "Standardized & stored");
    } catch (err) { toast(err.message || "Ingest failed","error"); }
    state.busy = false; rerender();
  }

  async function saveOverride(){
    if (!state.preview) return;
    const updated = await api.updateRule(state.preview.rule.id, { standardized_output: state.editValue });
    if (updated) {
      state.preview = { rule: updated, matched_existing: state.preview.matched_existing };
      state.editing = false;
      toast("Manual override saved");
      rerender();
    }
  }

  async function onPdf(file){
    if (!window['pdfjsLib']) { toast("PDF library failed to load (need internet)","error"); return; }
    state.pdfBusy = true; rerender();
    try {
      const ab = await file.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data: ab }).promise;
      let out = "";
      for (let i = 1; i <= doc.numPages; i++) {
        const page = await doc.getPage(i);
        const c = await page.getTextContent();
        out += c.items.map(it => it.str).join(" ") + "\n\n";
      }
      out = out.trim();
      if (!out) return toast("No extractable text in PDF","error");
      state.rawText = out;
      toast(`Extracted ${out.length.toLocaleString()} characters`);
    } catch (err) { toast(err.message || "PDF extraction failed","error"); }
    state.pdfBusy = false; rerender();
  }

  async function onCsv(file){
    state.csvBusy = true; state.csvProgress = { done:0, total:0 }; rerender();
    Papa.parse(file, {
      header: true, skipEmptyLines: true,
      complete: async (results) => {
        const rows = results.data;
        state.csvProgress = { done:0, total: rows.length }; rerender();
        let ok=0, dup=0, fail=0;
        for (let i=0;i<rows.length;i++){
          const r = rows[i];
          try {
            if (!r.airline || !r.raw_text) fail++;
            else {
              const res = await api.ingest({
                airline: r.airline,
                supplier: r.supplier || "Other",
                sector_type: r.sector_type || "domestic",
                fare_type: r.fare_type || "non-refundable",
                from_sector: r.from || undefined,
                to_sector: r.to || undefined,
                raw_text: r.raw_text,
              });
              if (res.matched_existing) dup++; else ok++;
            }
          } catch { fail++; }
          state.csvProgress = { done:i+1, total: rows.length };
          if ((i & 7) === 0) rerender();
        }
        state.csvBusy = false; rerender();
        toast(`Imported: ${ok} new · ${dup} hash-matched · ${fail} skipped`);
      },
      error: (err) => { state.csvBusy=false; rerender(); toast(err.message,"error"); }
    });
  }

  rerender();
}

function dropzone(accept, busy, onFile, hint){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = accept; inp.style.display="none";
  inp.addEventListener("change", e => { const f = e.target.files?.[0]; if (f) onFile(f); });
  const dz = h("div", {
    class:`flex cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed p-10 text-center transition-colors ${
      busy ? "border-accent bg-accent/10" : "border-border hover:bg-muted/40"
    }`,
    onClick: () => inp.click()
  });
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("border-accent","bg-accent/10"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("border-accent","bg-accent/10"));
  dz.addEventListener("drop", e => {
    e.preventDefault(); dz.classList.remove("border-accent","bg-accent/10");
    const f = e.dataTransfer.files?.[0]; if (f) onFile(f);
  });
  const i = h("div", { class: busy ? "spin" : "" });
  i.innerHTML = busy ? icon("loader") : icon("upload");
  i.firstChild.classList.add("h-8","w-8","text-mutedfg");
  i.firstChild.classList.remove("h-4","w-4");
  dz.append(i,
    h("p", { class:"mt-3 text-sm font-medium" }, hint),
    h("p", { class:"mt-1 text-xs text-mutedfg" }, busy ? "Processing…" : "Click or drag and drop"),
    inp
  );
  return dz;
}

/* ---------- Library ---------- */
function LibraryView(root){
  let rules = [];

  let selected = null;
  let editing = false, editValue = "";

  function rerender(){ root.innerHTML=""; root.appendChild(view()); }

  function filtered(){
    const ql = filters.q.toLowerCase();
    return rules.filter(r => {
      if (filters.airline !== "all" && r.airline !== filters.airline) return false;
      if (filters.supplier !== "all" && r.supplier !== filters.supplier) return false;
      if (filters.sector !== "all" && r.sector_type !== filters.sector) return false;
      if (filters.type !== "all" && r.fare_type !== filters.type) return false;
      if (ql && !`${r.airline} ${r.supplier||""} ${r.from_sector||""} ${r.to_sector||""} ${r.raw_text}`.toLowerCase().includes(ql)) return false;
      return true;
    });

    const wrap = h("div", { class:"space-y-6" });
    wrap.appendChild(h("div", {},
      h("h1", { class:"font-display text-2xl font-semibold tracking-tight" }, "Library"),

    ));

    const filtersBar = h("div", { class:"grid gap-3 md:grid-cols-5" },
      (() => {
        const i = input({ value: filters.q, placeholder:"Airline, supplier, sector, text…", class:"pl-8" });

        const wrap = h("div", { class:"space-y-1.5" },
          h("label", { class:"text-xs" }, "Search"),
          (() => {
            const r = h("div", { class:"relative" });
            r.innerHTML = `<span class="absolute left-2.5 top-2.5 text-mutedfg">${icon("search")}</span>`;
            r.appendChild(i);

          })()
        );
        return wrap;
      })(),
      (() => h("div", { class:"space-y-1.5" }, h("label",{class:"text-xs"},"Airline"),
        select([{value:"all",label:"All airlines"},...AIRLINES.map(a=>({value:a,label:a}))], filters.airline, v=>{filters.airline=v; renderTable();})))(),
      (() => h("div", { class:"space-y-1.5" }, h("label",{class:"text-xs"},"Supplier"),
        select([{value:"all",label:"All suppliers"},...SUPPLIERS.map(a=>({value:a,label:a}))], filters.supplier, v=>{filters.supplier=v; renderTable();})))(),
      (() => h("div", { class:"space-y-1.5" }, h("label",{class:"text-xs"},"Sector"),
        select([{value:"all",label:"All sectors"},...SECTOR_TYPES], filters.sector, v=>{filters.sector=v; renderTable();})))(),
      (() => h("div", { class:"space-y-1.5" }, h("label",{class:"text-xs"},"Fare type"),
        select([{value:"all",label:"All types"},...FARE_TYPES], filters.type, v=>{filters.type=v; renderTable();})))()
    );

    const tableWrap = h("div", { id:"tableWrap", class:"overflow-x-auto rounded-md border border-border" });
    function renderTable(){
      tableWrap.innerHTML = "";
      const list = filtered();
      const tbl = h("table", { class:"w-full text-sm" });
      const thead = h("thead", { class:"bg-muted/40 text-xs uppercase tracking-wide text-mutedfg" },
        h("tr", {},
          ...["Airline","Supplier","Sector","Fare","Route","Source","Hash","Updated"].map(t =>
            h("th", { class:"text-left font-medium px-3 py-2" }, t))
        )
      );
      const tb = h("tbody", {});
      if (list.length === 0) {
        tb.appendChild(h("tr", {}, h("td", { class:"text-center text-mutedfg py-8", colspan:"8" }, "No rules match. Try the Ingest tab.")));
      } else {
        list.forEach(r => {
          const tr = h("tr", { class:"cursor-pointer border-t border-border hover:bg-muted/30",
            onClick: () => { selected = r; editValue = r.standardized_output; editing = false; rerender(); } });
          tr.append(
            h("td", { class:"px-3 py-2 font-medium" }, r.airline),
            h("td", { class:"px-3 py-2 text-xs" }, r.supplier || "—"),
            h("td", { class:"px-3 py-2 capitalize" }, r.sector_type),
            h("td", { class:"px-3 py-2 capitalize" }, r.fare_type.replace(/-/g," ")),
            h("td", { class:"px-3 py-2 font-mono text-xs" }, r.from_sector && r.to_sector ? `${r.from_sector} → ${r.to_sector}` : "—"),
            h("td", { class:"px-3 py-2" }, sourceBadge(r.source)),
            h("td", { class:"px-3 py-2 font-mono text-xs" }, r.hash_key.slice(0,10)+"…"),
            h("td", { class:"px-3 py-2 text-xs text-mutedfg" }, fmtDateShort(r.updated_at)),
          );
          tb.appendChild(tr);
        });
      }
      tbl.append(thead, tb);
      tableWrap.appendChild(tbl);
    }
    renderTable();

    wrap.appendChild(card(h("div", { class:"p-6 space-y-4" }, filtersBar, tableWrap)));

    /* drawer */
    if (selected) {
      const overlay = h("div", { class:"fixed inset-0 z-50 bg-black/40", onClick: () => { selected = null; rerender(); } });
      const panel = h("div", { class:"absolute right-0 top-0 bottom-0 w-full sm:max-w-xl bg-white shadow-xl overflow-y-auto",

      title.appendChild(sourceBadge(selected.source));
      const closeBtn = h("button", { class:"absolute right-4 top-4 p-1 rounded hover:bg-muted", onClick: () => { selected=null; rerender(); } });

        h("p", { class:"mt-1 text-sm text-mutedfg capitalize" },
          `${selected.sector_type} · ${selected.fare_type.replace(/-/g," ")}` +
          (selected.supplier ? ` · ${selected.supplier}` : "") +
          (selected.from_sector && selected.to_sector ? ` · ${selected.from_sector} → ${selected.to_sector}` : "")

        h("pre", { class:"max-h-40 overflow-auto rounded-md border border-border bg-muted/40 p-3 font-mono text-xs whitespace-pre-wrap" }, selected.raw_text)
      ));

      const stdHead = h("div", { class:"flex items-center justify-between mb-1" },
        h("div", { class:"text-xs uppercase tracking-wider text-mutedfg" }, "Standardized output")
      );
      const actions = h("div", { class:"flex gap-1" });
      if (editing) {
        actions.append(
          btn("Save", { size:"sm", onClick: async () => {
            const r = await api.updateRule(selected.id, { standardized_output: editValue });
            if (r) { selected=r; editing=false; toast("Saved manual override"); await refresh(); }
          }}),
          btn("Cancel", { size:"sm", variant:"ghost", onClick: () => { editing=false; editValue=selected.standardized_output; rerender(); } })
        );
      } else {
        actions.append(
          btn("Re-process", { size:"sm", variant:"ghost", onClick: async () => {
            const r = await api.reprocess(selected.id);
            if (r) { selected=r; editValue=r.standardized_output; toast("Re-processed"); await refresh(); }
          }}),
          btn("Edit", { size:"sm", variant:"ghost", onClick: () => { editing=true; rerender(); } })
        );
      }
      stdHead.appendChild(actions);

      const stdBlock = h("div", {});
      stdBlock.appendChild(stdHead);
      if (editing) {
        const ta = textarea({ rows:12, value: editValue, class:"font-mono text-xs" });
        ta.addEventListener("input", e => editValue = e.target.value);
        stdBlock.appendChild(ta);
      } else {
        stdBlock.appendChild(h("pre", { class:"rounded-md border border-border bg-card p-3 font-mono text-xs whitespace-pre-wrap" }, selected.standardized_output));
      }
      body.appendChild(stdBlock);

      body.appendChild(h("div", { class:"grid grid-cols-2 gap-3 rounded-md border border-border bg-muted/30 p-3 text-xs" },
        h("div", {}, h("div", { class:"text-mutedfg" }, "Confidence"), h("div", { class:"font-mono" }, `${(selected.confidence*100).toFixed(0)}%`)),

      body.appendChild(btn("Delete rule", { variant:"destructive", class:"w-full",
        onClick: async () => {
          if (!confirm("Delete this rule?")) return;
          await api.deleteRule(selected.id);
          selected = null; toast("Rule deleted"); await refresh();
        }}));

      panel.append(head, body);
      overlay.appendChild(panel);
      wrap.appendChild(overlay);
    }

    return wrap;
  }

  async function refresh(){
    rules = await api.listRules();
    rerender();
  }
  refresh();

            row.appendChild(r);
          }
          return row;
        })()
      )
    );

    const sec2 = card(
      h("div", { class:"px-6 pt-6" }, h("h3", { class:"text-base font-semibold" }, "Lookup API key")),
      h("div", { class:"p-6 space-y-4" },
        h("p", { class:"text-sm text-mutedfg" },
          "Your portal sends this as ",
          h("code", { class:"text-xs" }, "x-api-key"),
          " when calling ",
          h("code", { class:"text-xs" }, "GET /api/fare-rule"),
          ". Rotate by changing the value here."
        ),
        (() => {
          const row = h("div", { class:"flex gap-2" });
          const i = input({ value: s.api_lookup_key, placeholder:"frk_…", class:"font-mono" });
          i.addEventListener("input", e => s.api_lookup_key = e.target.value);
          row.appendChild(i);
          row.appendChild(btn("Generate", { variant:"outline", onClick: () => {
            const arr = new Uint8Array(20); crypto.getRandomValues(arr);
            s.api_lookup_key = "frk_" + Array.from(arr).map(b => b.toString(16).padStart(2,"0")).join("");
            rerender();
          }}));
          const cb = btn("", { variant:"outline", onClick: () => {
            if (!s.api_lookup_key) return;
            navigator.clipboard.writeText(s.api_lookup_key); toast("Copied");
          }});
          cb.innerHTML = icon("copy");
          row.appendChild(cb);
          return row;
        })(),
        btn("Save", { onClick: () => { store.setSettings(s); toast("Saved"); }})
      )
    );

    const sec3 = card(
      h("div", { class:"px-6 pt-6" }, h("h3", { class:"text-base font-semibold" }, "API contract for backend team")),
      h("div", { class:"p-6" },
        h("pre", { class:"overflow-x-auto rounded-md border border-border bg-muted/40 p-4 font-mono text-xs whitespace-pre-wrap" },
`# Lookup
GET /api/fare-rule?airline=Air%20India&from=DEL&to=BOM&fare_type=non-refundable
Headers: x-api-key: <api_lookup_key>
→ 200 { status: "FOUND", source: "exact"|"ai"|"manual", fare_rule: "..." }
→ 404 { status: "NOT_FOUND" }

# Fallback (called by portal when lookup misses)
POST /api/fare-rule/fallback
Body: { airline, supplier, sector_type, fare_type, from?, to?, raw_text }
→ Hashes raw_text, returns stored output if hit.
→ Else calls external AI (temperature=0), formats into locked template,
  stores, logs, returns.

# Admin (auth required)
GET    /api/admin/rules
POST   /api/admin/rules
PATCH  /api/admin/rules/:id
DELETE /api/admin/rules/:id
GET    /api/admin/fallback-log
GET/PUT /api/admin/settings`)
      )
    );

    wrap.append(sec1, sec2, sec3);
    return wrap;
  }
  rerender();
}

/* ---------- bootstrap ---------- */
(async () => {
  const { data } = await supabase.auth.getSession();
  _currentUser = data.session?.user ?? null;
  if (!location.hash) location.hash = "#" + (_currentUser ? "/ingest" : "/login");
  render();
})();
</script>
</body>
</html>
