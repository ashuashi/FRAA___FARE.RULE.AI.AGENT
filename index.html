<style>
  :root{
    --bg:#0b1020; --panel:#11172b; --panel2:#0f1426; --muted:#94a3b8;
    --text:#e6edf7; --primary:#6366f1; --primary-2:#8b5cf6; --border:#1f2742;
    --success:#22c55e; --danger:#ef4444; --warning:#f59e0b;
  }
  html,body{background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif}
  .glass{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));border:1px solid var(--border);border-radius:14px}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem .9rem;border-radius:10px;font-weight:500;font-size:.875rem;border:1px solid var(--border);background:#1a2140;color:var(--text);cursor:pointer;transition:.15s}
  .btn:hover{background:#222a4f}
  .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));border:none}

  .input:focus,.select:focus,.textarea:focus{border-color:var(--primary)}
  .textarea{min-height:140px;font-family:ui-monospace,Menlo,monospace}
  .label{font-size:.78rem;color:var(--muted);margin-bottom:.3rem;display:block}
  .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .55rem;border-radius:999px;font-size:.7rem;border:1px solid var(--border);background:#0c1228}
  .badge-green{background:#052e1a;color:#86efac;border-color:#065f46}
  .badge-blue{background:#0a1f3d;color:#93c5fd;border-color:#1e40af}
  .badge-amber{background:#2a1d05;color:#fcd34d;border-color:#78350f}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th,td{text-align:left;padding:.65rem .75rem;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:500;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;background:#0c1228}
  tbody tr:hover{background:#0e1530;cursor:pointer}
  .nav-link{display:flex;align-items:center;gap:.6rem;padding:.55rem .8rem;border-radius:10px;color:var(--muted);font-size:.88rem;cursor:pointer;transition:.15s}
  .nav-link:hover{background:#151c36;color:var(--text)}
  .nav-link.active{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.18));color:#fff;border:1px solid rgba(99,102,241,.35)}
  .tab{padding:.5rem .9rem;border-radius:8px;font-size:.85rem;color:var(--muted);cursor:pointer}
  .tab.active{background:#1a2140;color:#fff}
  .pre{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:.8rem;background:#0c1228;border:1px solid var(--border);border-radius:10px;padding:.85rem;color:#cbd5e1}
  .toast{position:fixed;bottom:20px;right:20px;background:#11172b;border:1px solid var(--border);padding:.75rem 1rem;border-radius:10px;font-size:.85rem;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:9999;animation:slideIn .2s ease}
  @keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,100%);background:#0c1228;border-left:1px solid var(--border);z-index:50;overflow:auto;animation:slideX .2s ease}
  @keyframes slideX{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
  .backdrop{position:fixed;inset:0;background:rgba(2,6,23,.6);z-index:40}
  .dz{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;color:var(--muted);cursor:pointer;transition:.15s}
  .dz:hover,.dz.over{border-color:var(--primary);background:#0e1530;color:var(--text)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#1f2742;border-radius:10px}
</style>
</head>
<body class="min-h-screen">
<div id="app"></div>
<div id="toast-host"></div>

<script>
/* =====================================================================
   FRAA Standalone — single-file port of the React app
   ===================================================================== */

/* ---------- Logo (inline SVG, horizontal) ---------- */
const LOGO_SVG = `
<svg viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg" class="h-9">
  <defs>
    <linearGradient id="lg" x1="0" x2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
  </defs>
  <g transform="translate(2,4)">
    <rect width="36" height="36" rx="10" fill="url(#lg)"/>
    <path d="M7 22 L29 11 L23 22 L29 33 Z" fill="white" opacity=".95"/>
  </g>
  <text x="46" y="22" font-family="ui-sans-serif,system-ui" font-weight="700" font-size="18" fill="#e6edf7">FRAA</text>
  <text x="46" y="36" font-family="ui-sans-serif,system-ui" font-weight="500" font-size="10" fill="#94a3b8" letter-spacing="2">FARERULE · AI · AGENT</text>
</svg>`;

/* ---------- Storage keys ---------- */
const NS = "fraa.v3";
const K = {
  rules: NS+".rules",
  log: NS+".fallback_log",
  settings: NS+".settings",
  auth: NS+".auth",
  supa: NS+".supa",
  dropdowns: NS+".dropdowns_cache",
};

/* ---------- Default dropdowns (used only if Supabase has no rows) ---------- */
const DEFAULT_DROPDOWNS = {
  airline: ["Air India","IndiGo","SpiceJet","Vistara","Akasa Air","Emirates","Qatar Airways","Singapore Airlines","Lufthansa","British Airways"],
  supplier: ["Amadeus","Sabre","Travelport","TBO","Riya","Direct (Airline GDS)","Other"],
  fare_type: ["refundable","non-refundable","partially-refundable","promo"],
  sector_type: ["domestic","international"],
};

/* ---------- Supabase ---------- */
let supabase = null;
let supaLibReady = false;
window.addEventListener("supabase-lib-ready", ()=>{ supaLibReady=true; bootSupabase(); });

function getSupaCfg(){ try { return JSON.parse(localStorage.getItem(K.supa)||"null"); } catch { return null; } }
function setSupaCfg(c){ localStorage.setItem(K.supa, JSON.stringify(c)); }
function bootSupabase(){
  const cfg = getSupaCfg();
  if (cfg && cfg.url && cfg.key && window.__createSupabase){
    try { supabase = window.__createSupabase(cfg.url, cfg.key); }
    catch(e){ console.warn("Supabase init failed", e); supabase=null; }
  } else supabase=null;
}
function supaReady(){ return !!supabase; }

/* ---------- Toast ---------- */
function toast(msg, kind="info"){
  const el = document.createElement("div");
  el.className="toast";
  el.style.borderColor = kind==="error" ? "#7f1d1d" : kind==="success" ? "#065f46" : "var(--border)";
  el.textContent = msg;
  document.getElementById("toast-host").appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}

/* ---------- Hashing ---------- */
function normalizeRuleText(s){
  return s.replace(/\r\n/g,"\n").replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"')
    .replace(/\s+/g," ").replace(/[\.,;:!?\-]+/g,m=>m[0]).trim().toLowerCase();
}
async function sha256(text){
  const buf = new TextEncoder().encode(text);
  const h = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function hashRule(raw){ const cleaned = normalizeRuleText(raw); return { cleaned, hash: await sha256(cleaned) }; }

/* ---------- Standardizer ---------- */
const TEMPLATE_SECTIONS = ["Cancellation","Date Change","No Show","Baggage"];
function emptySections(){ return {Cancellation:[], "Date Change":[], "No Show":[], Baggage:[]}; }
function renderStandardized(s){
  return TEMPLATE_SECTIONS.map(k=>{
    const b = s[k].length ? s[k] : ["Not specified"];
    return `${k}:\n${b.map(x=>"- "+x).join("\n")}`;
  }).join("\n\n");
}
function deterministicStandardize(raw){
  const text = raw.replace(/\s+/g," ").trim();
  const sec = emptySections();
  const grab=(re,max=3)=>{const out=[];const seen=new Set();let m;const r=new RegExp(re.source,"gi");while((m=r.exec(text))&&out.length<max){const v=m[0].replace(/\s+/g," ").trim();if(!seen.has(v.toLowerCase())){seen.add(v.toLowerCase());out.push(v);}}return out;};
  sec.Cancellation = grab(/(cancel\w*|refund\w*)[^.;]*?(₹|inr|usd|\$|€)\s?\d[\d,]*[^.;]*/i,3);
  if (/non[-\s]?refundable/i.test(text)) sec.Cancellation.push("Non-refundable");
  sec["Date Change"] = grab(/(date\s?change|reschedul\w*|chang\w*)[^.;]*?(₹|inr|usd|\$|€)\s?\d[\d,]*[^.;]*/i,3);
  if (/fare\s?difference/i.test(text)) sec["Date Change"].push("Fare difference applicable");
  if (/no[-\s]?show/i.test(text)){
    const ns=grab(/no[-\s]?show[^.;]{0,80}/i,1); sec["No Show"]= ns.length?ns:["Non-refundable"];
  }
  sec.Baggage = grab(/\d{1,3}\s?kg[^.;]{0,40}/i,3);
  const output = renderStandardized(sec);
  const filled = Object.values(sec).filter(a=>a.length>0).length / TEMPLATE_SECTIONS.length;
  return { output, confidence: Math.max(0.55, filled) };
}

/* ---------- Storage layer (Supabase + localStorage fallback) ---------- */
function lsGet(k,f){ try{return JSON.parse(localStorage.getItem(k)||"null") ?? f;}catch{return f;} }
function lsSet(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

const store = {
  async listRules(){
    if (supaReady()){
      const { data, error } = await supabase.from("fare_rules").select("*").order("created_at",{ascending:false});
      if (!error && data) return data;
    }
    return lsGet(K.rules, []);
  },
  async insertRule(rule){
    if (supaReady()){
      const { data, error } = await supabase.from("fare_rules").insert(rule).select().single();
      if (!error && data) return data;
    }
    const all = lsGet(K.rules, []); all.unshift(rule); lsSet(K.rules, all); return rule;
  },
  async updateRule(id, patch){
    if (supaReady()){
      const { data, error } = await supabase.from("fare_rules").update(patch).eq("id",id).select().single();
      if (!error && data) return data;
    }
    const all = lsGet(K.rules, []); const i = all.findIndex(r=>r.id===id);
    if (i>=0){ all[i] = {...all[i], ...patch}; lsSet(K.rules, all); return all[i]; }
    return null;
  },
  async deleteRule(id){
    if (supaReady()){ await supabase.from("fare_rules").delete().eq("id",id); return; }
    lsSet(K.rules, lsGet(K.rules,[]).filter(r=>r.id!==id));
  },
  async findByHash(hash){
    if (supaReady()){
      const { data } = await supabase.from("fare_rules").select("*").eq("hash_key",hash).maybeSingle();
      if (data) return data;
    }
    return lsGet(K.rules, []).find(r=>r.hash_key===hash) || null;
  },
  async getLog(){
    if (supaReady()){
      const { data } = await supabase.from("fallback_log").select("*").order("created_at",{ascending:false}).limit(500);
      if (data) return data;
    }
    return lsGet(K.log, []);
  },
  async listDropdowns(){
    if (supaReady()){
      const { data, error } = await supabase.from("dropdown_options").select("*").order("category").order("sort_order");
      if (!error && data && data.length){
        const grouped = { airline:[], supplier:[], fare_type:[], sector_type:[] };
        data.forEach(r=>{ if (grouped[r.category]) grouped[r.category].push(r.value); });
        // Fill any empty group with defaults
        Object.keys(grouped).forEach(k=>{ if (!grouped[k].length) grouped[k]=DEFAULT_DROPDOWNS[k]; });
        lsSet(K.dropdowns, grouped);
        return grouped;
      }
    }
    return lsGet(K.dropdowns, DEFAULT_DROPDOWNS);
  },
};

/* ---------- API ---------- */
const uid = ()=> Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const nowISO = ()=> new Date().toISOString();

const api = {
  async ingest(payload){
    const { cleaned, hash } = await hashRule(payload.raw_text);
    const existing = await store.findByHash(hash);
    if (existing) return { rule: existing, matched_existing:true };
    const { output, confidence } = deterministicStandardize(payload.raw_text);
    const rule = {
      id: uid(),
      airline: payload.airline, supplier: payload.supplier,
      sector_type: payload.sector_type, fare_type: payload.fare_type,
      from_sector: payload.from_sector ? payload.from_sector.toUpperCase() : null,
      to_sector: payload.to_sector ? payload.to_sector.toUpperCase() : null,
      raw_text: payload.raw_text, cleaned_text: cleaned, hash_key: hash,
      standardized_output: output, source: "ai", confidence,
      created_at: nowISO(), updated_at: nowISO(),
    };
    const saved = await store.insertRule(rule);
    return { rule: saved, matched_existing:false };
  },
};

/* ---------- Auth (local only) ---------- */
const auth = {
  user(){ return lsGet(K.auth, null); },
  async login(email, password){
    if (!email || !password) throw new Error("Email and password required");
    if (!/.+@.+\..+/.test(email)) throw new Error("Invalid email");
    if (password.length < 6) throw new Error("Password must be 6+ characters");
    await new Promise(r=>setTimeout(r,300));
    const u = { email }; lsSet(K.auth, u); return u;
  },
  logout(){ localStorage.removeItem(K.auth); },
};

/* ---------- Router ---------- */
const routes = {
  "/login": renderLogin,
  "/ingest": renderIngest,
  "/library": renderLibrary,
  "/fallback-log": renderFallbackLog,
  "/settings": renderSettings,
};
function navigate(path){ location.hash = "#"+path; }
window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", ()=>{
  bootSupabase();
  if (!location.hash) location.hash = "#/login";
  route();
});

function route(){
  const path = location.hash.replace(/^#/,"") || "/login";
  const u = auth.user();
  if (!u && path !== "/login") return navigate("/login");
  if (u && path === "/login") return navigate("/ingest");
  const fn = routes[path] || renderNotFound;
  if (path === "/login") document.getElementById("app").innerHTML = "", fn(document.getElementById("app"));
  else renderShell(path, fn);
}

/* ---------- Shell ---------- */
function renderShell(path, pageFn){
  const root = document.getElementById("app");
  root.innerHTML = `
    <div class="flex min-h-screen">
      <aside class="w-64 border-r border-[var(--border)] p-4 hidden md:flex md:flex-col" style="background:#0a0f22">
        <div class="px-2 py-3">${LOGO_SVG}</div>
        <nav class="mt-4 flex flex-col gap-1">
          ${navLink(path,"/ingest","Ingest","M12 4v16m8-8H4")}
          ${navLink(path,"/library","Library","M4 6h16M4 12h16M4 18h16")}
          ${navLink(path,"/fallback-log","Fallback Log","M3 12h4l3 9 4-18 3 9h4")}
          ${navLink(path,"/settings","Settings","M12 8a4 4 0 100 8 4 4 0 000-8z M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z")}
        </nav>
        <div class="mt-auto pt-4 border-t border-[var(--border)] text-xs text-[var(--muted)]">
          <div class="px-2 mb-2">Signed in as<br/><span class="text-[var(--text)]">${(auth.user()||{}).email||""}</span></div>
          <button class="btn w-full" onclick="logout()">Sign out</button>
        </div>
      </aside>
      <main class="flex-1 p-6 md:p-8 max-w-6xl mx-auto w-full" id="page"></main>
    </div>`;
  pageFn(document.getElementById("page"));
}
function navLink(active, to, label, dPath){
  return `<a class="nav-link ${active===to?"active":""}" onclick="navigate('${to}')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${dPath}"/></svg>
    ${label}
  </a>`;
}
window.navigate = navigate;
window.logout = ()=>{ auth.logout(); navigate("/login"); };

/* ---------- Pages ---------- */

/* Login */
function renderLogin(root){
  root.innerHTML = `
  <div class="min-h-screen grid md:grid-cols-2">
    <div class="hidden md:flex flex-col justify-between p-10" style="background:linear-gradient(135deg,#0a0f22,#1a1240)">
      <div>${LOGO_SVG}</div>
      <div>
        <h2 class="text-3xl font-semibold">Standardize fare rules.<br/>Same input → same output.</h2>
        <p class="mt-3 text-[var(--muted)]">Deterministic hashing + locked template. Backed by your AI of choice.</p>
      </div>
      <div class="text-xs text-[var(--muted)]">© FRAA</div>
    </div>
    <div class="flex items-center justify-center p-8">
      <div class="glass w-full max-w-sm p-6">
        <h1 class="text-xl font-semibold mb-1">Sign in</h1>
        <p class="text-sm text-[var(--muted)] mb-5">Admin access to the rule library.</p>
        <form id="loginForm" class="space-y-3">
          <div><label class="label">Email</label><input class="input" type="email" id="email" placeholder="admin@example.com" required></div>
          <div><label class="label">Password</label><input class="input" type="password" id="password" minlength="6" placeholder="••••••" required></div>
          <button class="btn btn-primary w-full justify-center" id="loginBtn" type="submit">Sign in</button>
        </form>
      </div>
    </div>
  </div>`;
  document.getElementById("loginForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const btn = document.getElementById("loginBtn"); btn.disabled=true; btn.textContent="Signing in…";
    try{
      await auth.login(document.getElementById("email").value.trim(), document.getElementById("password").value);
      toast("Welcome","success"); navigate("/ingest");
    }catch(err){ toast(err.message,"error"); btn.disabled=false; btn.textContent="Sign in"; }
  });
}

/* Ingest */
async function renderIngest(root){
  const dd = await store.listDropdowns();
  root.innerHTML = `
    <h1 class="text-2xl font-semibold">Ingest rule</h1>
    <p class="text-sm text-[var(--muted)] mt-1">Paste, upload PDF, or bulk import CSV. Same input always returns the same output.</p>

    <div class="glass mt-6 p-5">
      <div class="flex gap-2 mb-4" id="tabs">
        <div class="tab active" data-t="paste">Paste</div>
        <div class="tab" data-t="pdf">PDF</div>
        <div class="tab" data-t="csv">CSV</div>
      </div>

      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div><label class="label">Airline</label>${selectHTML("airline", dd.airline)}</div>
        <div><label class="label">Supplier</label>${selectHTML("supplier", dd.supplier)}</div>
        <div><label class="label">Sector type</label>${selectHTML("sector_type", dd.sector_type)}</div>
        <div><label class="label">Fare type</label>${selectHTML("fare_type", dd.fare_type)}</div>
        <div><label class="label">From (optional)</label><input id="from_sector" class="input" placeholder="DEL" maxlength="3"></div>
        <div><label class="label">To (optional)</label><input id="to_sector" class="input" placeholder="BOM" maxlength="3"></div>
      </div>

      <div id="modePaste">
        <label class="label">Raw rule text</label>
        <textarea class="textarea" id="rawText" placeholder="Paste raw fare rule text…"></textarea>
        <div class="mt-3 flex gap-2"><button class="btn btn-primary" id="ingestBtn">Standardize & Save</button></div>
      </div>

      <div id="modePdf" class="hidden">
        <div class="dz" id="pdfDz">Drop a PDF here or click to upload</div>
        <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
        <div id="pdfStatus" class="mt-3 text-sm text-[var(--muted)]"></div>
      </div>

      <div id="modeCsv" class="hidden">
        <div class="dz" id="csvDz">Drop a CSV (airline,supplier,sector_type,fare_type,from,to,raw_text)</div>
        <input type="file" id="csvFile" accept=".csv,text/csv" class="hidden">
        <div id="csvStatus" class="mt-3 text-sm text-[var(--muted)]"></div>
      </div>
    </div>

    <div id="preview" class="mt-6"></div>
  `;
  // tabs
  root.querySelectorAll("#tabs .tab").forEach(t=>t.addEventListener("click",()=>{
    root.querySelectorAll("#tabs .tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    ["paste","pdf","csv"].forEach(m=>document.getElementById("mode"+m[0].toUpperCase()+m.slice(1)).classList.toggle("hidden", m!==t.dataset.t));
  }));

  document.getElementById("ingestBtn").addEventListener("click", doIngest);

  // PDF
  const pdfDz = document.getElementById("pdfDz");
  const pdfFile = document.getElementById("pdfFile");
  pdfDz.addEventListener("click",()=>pdfFile.click());
  ["dragover","dragenter"].forEach(ev=>pdfDz.addEventListener(ev,e=>{e.preventDefault();pdfDz.classList.add("over");}));
  ["dragleave","drop"].forEach(ev=>pdfDz.addEventListener(ev,e=>{e.preventDefault();pdfDz.classList.remove("over");}));
  pdfDz.addEventListener("drop",e=>{const f=e.dataTransfer.files[0]; if(f) handlePdf(f);});
  pdfFile.addEventListener("change",e=>{const f=e.target.files[0]; if(f) handlePdf(f);});

  // CSV
  const csvDz = document.getElementById("csvDz");
  const csvFile = document.getElementById("csvFile");
  csvDz.addEventListener("click",()=>csvFile.click());
  ["dragover","dragenter"].forEach(ev=>csvDz.addEventListener(ev,e=>{e.preventDefault();csvDz.classList.add("over");}));
  ["dragleave","drop"].forEach(ev=>csvDz.addEventListener(ev,e=>{e.preventDefault();csvDz.classList.remove("over");}));
  csvDz.addEventListener("drop",e=>{const f=e.dataTransfer.files[0]; if(f) handleCsv(f);});
  csvFile.addEventListener("change",e=>{const f=e.target.files[0]; if(f) handleCsv(f);});
}

function selectHTML(id, options){
  return `<select id="${id}" class="select">${options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select>`;
}

function readForm(){
  return {
    airline: document.getElementById("airline").value,
    supplier: document.getElementById("supplier").value,
    sector_type: document.getElementById("sector_type").value,
    fare_type: document.getElementById("fare_type").value,
    from_sector: document.getElementById("from_sector").value.trim() || undefined,
    to_sector: document.getElementById("to_sector").value.trim() || undefined,
  };
}

async function doIngest(text){
  const raw = typeof text === "string" ? text : document.getElementById("rawText").value.trim();
  if (!raw){ toast("Raw text is empty","error"); return; }
  const payload = { ...readForm(), raw_text: raw };
  try{
    const res = await api.ingest(payload);
    renderPreview(res);
    toast(res.matched_existing ? "Exact match — returned stored output" : "Saved","success");
  }catch(e){ toast("Ingest failed: "+e.message,"error"); }
}

async function handlePdf(file){
  const status = document.getElementById("pdfStatus");
  status.textContent = "Extracting text…";
  try{
    if (window.pdfjsLib){
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.js";
    }
    const buf = await file.arrayBuffer();
    const doc = await pdfjsLib.getDocument({data:buf}).promise;
    let text = "";
    for (let i=1;i<=doc.numPages;i++){
      const p = await doc.getPage(i);
      const c = await p.getTextContent();
      text += c.items.map(it=>it.str||"").join(" ")+"\n";
    }
    status.textContent = "Extracted "+text.length+" chars. Standardizing…";
    await doIngest(text.replace(/\s+/g," ").trim());
    status.textContent = "Done.";
  }catch(e){ status.textContent = "PDF failed: "+e.message; }
}

async function handleCsv(file){
  const status = document.getElementById("csvStatus");
  status.textContent = "Parsing…";
  Papa.parse(file, {
    header:true, skipEmptyLines:true,
    complete: async (res)=>{
      let n=0, ok=0;
      for (const row of res.data){
        if (!row.raw_text) continue;
        n++;
        try{
          await api.ingest({
            airline: row.airline||"Air India",
            supplier: row.supplier||"Other",
            sector_type: (row.sector_type||"domestic").toLowerCase(),
            fare_type: (row.fare_type||"non-refundable").toLowerCase(),
            from_sector: row.from || undefined,
            to_sector: row.to || undefined,
            raw_text: row.raw_text,
          });
          ok++;
          status.textContent = `Imported ${ok}/${n}…`;
        }catch{}
      }
      status.textContent = `Done — ${ok} of ${n} rows imported.`;
      toast(`Imported ${ok}/${n}`,"success");
    },
    error: e=>{ status.textContent="CSV error: "+e.message; },
  });
}

function openDrawer(r){
  const host = document.createElement("div");
  host.innerHTML = `<div class="backdrop" id="bd"></div><div class="drawer p-6">
    <div class="flex justify-between items-start mb-4">

    <div class="space-y-4">
      <div><div class="label">Raw text</div><div class="pre">${escapeHtml(r.raw_text)}</div></div>
      <div><div class="label">Standardized output (editable)</div>
        <textarea class="textarea" id="stdOut">${escapeHtml(r.standardized_output)}</textarea>

    </div>
  </div>`;
  document.body.appendChild(host);
  const close = ()=>host.remove();
  host.querySelector("#bd").onclick = close;
  host.querySelector("#closeDr").onclick = close;
  host.querySelector("#saveBtn").onclick = async ()=>{
    await store.updateRule(r.id, { standardized_output: host.querySelector("#stdOut").value, source:"manual", updated_at: nowISO() });

  };

    if (!confirm("Delete this rule?")) return;
    await store.deleteRule(r.id); toast("Deleted","success"); close();
    renderLibrary(document.getElementById("page"));
  };
}

/* ---------- Helpers ---------- */
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,"&#39;"); }
function renderNotFound(root){ root.innerHTML = `<h1 class="text-2xl">Not found</h1><a class="btn mt-4" onclick="navigate('/ingest')">Go home</a>`; }

/* ---------- SQL setup script ---------- */
const SUPABASE_SQL = `-- ===========================================================
-- FRAA — Supabase setup
-- Paste this entire block into Supabase → SQL Editor → Run
-- ===========================================================

-- 1. Fare rules
create table if not exists public.fare_rules (
  id text primary key,
  airline text not null,
  supplier text not null,
  sector_type text not null check (sector_type in ('domestic','international')),
  fare_type text not null,
  from_sector text,
  to_sector text,
  raw_text text not null,
  cleaned_text text not null,
  hash_key text not null unique,
  standardized_output text not null,
  source text not null default 'ai',
  confidence numeric not null default 0.7,
  created_at timestamptz not null default now(),
  updated_at timestamptz not null default now()
);
create index if not exists idx_fare_rules_airline on public.fare_rules(airline);
create index if not exists idx_fare_rules_fare_type on public.fare_rules(fare_type);
create index if not exists idx_fare_rules_sector_type on public.fare_rules(sector_type);

-- 2. Fallback log

  created_at timestamptz not null default now()
);

-- 3. Dynamic dropdown options (editable from backend)
create table if not exists public.dropdown_options (
  id bigserial primary key,

  value text not null,
  label text,
  sort_order int not null default 0,
  created_at timestamptz not null default now(),
  unique(category, value)
);
create index if not exists idx_dropdown_options_cat on public.dropdown_options(category, sort_order);

-- 4. Seed default options (idempotent)
insert into public.dropdown_options (category, value, label, sort_order) values
  ('airline','Air India','Air India',1),
  ('airline','IndiGo','IndiGo',2),
  ('airline','SpiceJet','SpiceJet',3),
  ('airline','Vistara','Vistara',4),
  ('airline','Akasa Air','Akasa Air',5),
  ('airline','Emirates','Emirates',6),
  ('airline','Qatar Airways','Qatar Airways',7),
  ('airline','Singapore Airlines','Singapore Airlines',8),
  ('airline','Lufthansa','Lufthansa',9),
  ('airline','British Airways','British Airways',10),
  ('supplier','Amadeus','Amadeus',1),
  ('supplier','Sabre','Sabre',2),
  ('supplier','Travelport','Travelport',3),
  ('supplier','TBO','TBO',4),
  ('supplier','Riya','Riya',5),
  ('supplier','Direct (Airline GDS)','Direct',6),
  ('supplier','Other','Other',7),
  ('fare_type','refundable','Refundable',1),
  ('fare_type','non-refundable','Non-refundable',2),
  ('fare_type','partially-refundable','Partially refundable',3),
  ('fare_type','promo','Promo',4),
  ('sector_type','domestic','Domestic',1),
  ('sector_type','international','International',2)
on conflict (category, value) do nothing;

-- 5. Row Level Security
alter table public.fare_rules enable row level security;
alter table public.fallback_log enable row level security;
alter table public.dropdown_options enable row level security;

-- Prototype-friendly policies (anon read+write).
-- Tighten before production by restricting writes to an admin role.
drop policy if exists "anon read fare_rules" on public.fare_rules;
drop policy if exists "anon write fare_rules" on public.fare_rules;
create policy "anon read fare_rules" on public.fare_rules for select using (true);
create policy "anon write fare_rules" on public.fare_rules for all using (true) with check (true);

drop policy if exists "anon read fallback_log" on public.fallback_log;

`;
